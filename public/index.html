<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PoC - Autenticação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .btn-eye { background: none; border: 1px solid #dee2e6; border-left: none; border-radius: 0 0.375rem 0.375rem 0; padding: 0 12px; cursor: pointer; display: flex; align-items: center; }
        .btn-eye:hover { background-color: #f8f9fa; }
    </style>
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container" style="max-width: 400px;">
        <h2 class="text-center mb-4">Acesso ao Sistema</h2>

        <div class="card shadow-sm">
            <div class="card-body p-4">

                <div class="mb-3 text-center">
                    <div id="google-signin-btn" class="d-flex justify-content-center"></div>
                    <p id="googleFeedback" class="text-danger small text-center fw-bold mt-2 mb-0"></p>
                </div>
                <div class="d-flex align-items-center gap-2 mb-3">
                    <hr class="flex-grow-1 m-0">
                    <span class="text-muted small px-1">ou entre com seus dados</span>
                    <hr class="flex-grow-1 m-0">
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small">Usuário ou E-mail</label>
                    <input type="text" id="loginIdentifier" class="form-control" placeholder="Digite seu usuário ou e-mail">
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small">Senha</label>
                    <div class="input-group">
                        <input type="password" id="loginPass" class="form-control" placeholder="Digite sua senha">
                        <button class="btn-eye" type="button" id="loginPassToggle" onclick="togglePassword('loginPass', 'loginPassToggle')" tabindex="-1">
                            <svg width="20" height="14" viewBox="0 0 20 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path fill-rule="evenodd" clip-rule="evenodd" d="M9.67 0C5.27455 0 1.52083 2.73397 0 6.59318C1.52083 10.4524 5.27455 13.1864 9.67 13.1864C14.0655 13.1864 17.8192 10.4524 19.34 6.59318C17.8192 2.73397 14.0655 0 9.67 0ZM9.6702 10.989C7.24391 10.989 5.27474 9.0198 5.27474 6.59351C5.27474 4.16722 7.24391 2.19806 9.6702 2.19806C12.0965 2.19806 14.0657 4.16722 14.0657 6.59351C14.0657 9.0198 12.0965 10.989 9.6702 10.989ZM7.0325 6.59358C7.0325 5.13429 8.21048 3.95631 9.66977 3.95631C11.1291 3.95631 12.307 5.13429 12.307 6.59358C12.307 8.05287 11.1291 9.23085 9.66977 9.23085C8.21048 9.23085 7.0325 8.05287 7.0325 6.59358Z" fill="#B2B2B2"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button onclick="submitLogin()" class="btn btn-primary w-100 fw-bold mb-3">Entrar</button>
                <p id="loginFeedback" class="text-danger small text-center fw-bold"></p>
                
                <hr>
                <div class="text-center mt-3">
                    <span class="text-muted small">Não possui acesso?</span>
                    <br>
                    <a href="/register.html" class="text-decoration-none small fw-bold">Criar conta</a>
                    <br>
                    <a href="/recover.html" class="text-decoration-none small fw-bold text-secondary">Esqueci minha senha</a>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        window.addEventListener('load', () => {
            if (typeof google !== 'undefined') initGoogleSignIn();
        });
    </script>
</body>
</html>
