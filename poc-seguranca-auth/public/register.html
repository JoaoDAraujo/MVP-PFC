<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PoC - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container" style="max-width: 450px;">
        
        <div class="card shadow-sm mb-3">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Registrar Usuário</h3>
                
                <div class="mb-3">
                    <label class="form-label text-muted small">Novo Usuário</label>
                    <input type="text" id="signupUser" class="form-control">
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small">Nova Senha</label>
                    <input type="password" id="signupPass" class="form-control">
                </div>
                
                <button onclick="handleSignup()" class="btn btn-dark w-100 fw-bold mb-2">Criar Conta no Banco</button>
                <p id="signupFeedback" class="text-danger small text-center fw-bold"></p>
            </div>
        </div>

        <div id="successBox" class="card shadow border-info border-2 d-none">
            <div class="card-body text-center p-4">
                <h5 class="text-info-emphasis fw-bold">Conta criada com sucesso!</h5>
                <p class="small text-muted mb-3">Escaneie o QR Code abaixo no seu Google Authenticator antes de prosseguir.</p>
                <img id="qrCodeImg" class="img-fluid border rounded p-2 mb-3 bg-white" alt="QR Code">
                <a href="/" class="btn btn-info w-100 text-white fw-bold">Ir para o Login</a>
            </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
