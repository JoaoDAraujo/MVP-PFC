<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PoC - Verificação 2FA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container" style="max-width: 400px;">
        <div class="card shadow border-warning border-2">
            <div class="card-body p-4 text-center">
                <h4 class="card-title mb-2 text-warning-emphasis fw-bold">Segurança Adicional</h4>
                <p class="text-muted small mb-4">Insira o código de 6 dígitos gerado pelo seu aplicativo autenticador.</p>
                
                <div class="mb-4">
                    <input type="text" id="mfaCode" class="form-control form-control-lg text-center fw-bold border-warning" placeholder="000000" maxlength="6">
                </div>
                
                <button onclick="submitMfa()" class="btn btn-warning w-100 fw-bold text-dark">Validar Autenticação</button>
                <p id="mfaFeedback" class="text-danger small text-center mt-3 fw-bold"></p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
