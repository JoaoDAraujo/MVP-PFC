<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PoC - Autenticação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container" style="max-width: 400px;">
        <h2 class="text-center mb-4">Acesso ao Sistema</h2>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="mb-3">
                    <label class="form-label text-muted small">Usuário</label>
                    <input type="text" id="loginUser" class="form-control" placeholder="Digite seu usuário">
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small">Senha</label>
                    <input type="password" id="loginPass" class="form-control" placeholder="Digite sua senha">
                </div>
                <button onclick="submitLogin()" class="btn btn-primary w-100 fw-bold mb-3">Entrar</button>
                <p id="loginFeedback" class="text-danger small text-center fw-bold"></p>
                
                <hr>
                <div class="text-center mt-3">
                    <span class="text-muted small">Não possui acesso?</span>
                    <br>
                    <a href="/register.html" class="text-decoration-none small fw-bold">Criar conta</a>
                    <br>
                    
                    <a href="/recover.html" class="text-decoration-none small fw-bold text-secondary">Esqueci minha senha</a>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
