<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>PoC - Área Protegida</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light pt-5" onload="verifySessionOnLoad()">
    <div class="container" style="max-width: 600px;">
        
        <div class="card shadow border-success border-2 mb-4">
            <div class="card-header bg-success text-white py-3">
                <h4 class="mb-0 text-center fw-bold">Painel de Evidências (Sessão Segura)</h4>
            </div>
            <div class="card-body bg-success-subtle p-4">
                <h5 class="fw-bold text-success-emphasis mb-3">Status da Autenticação</h5>
                <div class="alert alert-light border-success d-flex align-items-center" role="alert">
                    <span id="sessionStatus" class="fw-bold">Verificando sessão com o servidor...</span>
                </div>
                <p class="text-muted small mb-0">Esta página e este status só são acessíveis se o cookie de sessão do Express for validado no backend após as duas etapas (Senha + 2FA).</p>
            </div>
        </div>

        <div class="d-grid gap-2">
            <button onclick="handleLogout()" class="btn btn-outline-danger fw-bold py-2">Encerrar Sessão (Logout)</button>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
